services:
  postgres:
    image: postgres:16-alpine
    container_name: pred-market-postgres
    environment:
      POSTGRES_DB: pred_market
      POSTGRES_USER: pred_market
      POSTGRES_PASSWORD: pred_market
    ports:
      - "5433:5432"
    volumes:
      - pred_market_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pred_market -d pred_market"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: pred-market-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pred_market_postgres_data:
